services:
  postgres:
    image: postgres:16.8-alpine
    container_name: credential-intelligence-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: credential_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - credential-intelligence-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d credential_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  credential-intelligence-postgres-data:
